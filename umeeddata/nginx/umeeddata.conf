server {
    listen 80;
    server_name umeeddata.in www.umeeddata.in;

    # Redirect HTTP to HTTPS (certbot will modify this)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name umeeddata.in www.umeeddata.in;

    # SSL certificates (managed by certbot)
    # ssl_certificate /etc/letsencrypt/live/umeeddata.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/umeeddata.in/privkey.pem;

    # Frontend - serve static build
    root /umeeddata/frontend/build;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # API requests -> backend
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie support
        proxy_set_header Cookie $http_cookie;

        # Timeouts for PDF/Excel generation
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # File upload size (for CSV uploads)
        client_max_body_size 10M;
    }

    # Frontend - SPA routing (all non-API, non-file routes serve index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
